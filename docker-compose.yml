services:
  server:
    image: ghcr.io/k4hvh/midnightserver:latest
    ports:
      - "50051:50051"
    environment:
      DATABASE_URL: postgres://midnight:midnight@db:5432/midnight
      LISTEN_ADDR: 0.0.0.0:50051
      LOG_LEVEL: info
      LOG_STYLE: compact          # plain | compact | pretty | json | auto
      CORS_ORIGINS: "*"        # comma-separated origins, or *
      REQUEST_TIMEOUT_SECS: 30
      DB_MAX_CONNECTIONS: 20
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: midnight
      POSTGRES_PASSWORD: midnight
      POSTGRES_DB: midnight
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U midnight -d midnight"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  postgres_data:
